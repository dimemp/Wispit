
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1px;
  border-radius: 12px;
  overflow: hidden;
  background-color: #d8d8d8;
}
.card { background: #f2f2f2; padding: 1.5rem 1.25rem; cursor: pointer; }
.graphic-area { height: 160px; position: relative; overflow: hidden; }
canvas { display: block; width: 100%; height: 160px; }
</style>

<div class="row">
  <div class="card" id="card1"><div class="graphic-area"><canvas id="c1" width="220" height="160"></canvas></div></div>
  <div class="card" id="card2"><div class="graphic-area"><canvas id="c2" width="220" height="160"></canvas></div></div>
  <div class="card" id="card3"><div class="graphic-area"><canvas id="c3" width="220" height="160"></canvas></div></div>
</div>

<script>
(function(){
  function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

  const BLUE=[0,132,255];
  const LW=0.7;
  const BG='#f2f2f2';
  const lineC='#d9d9d9';
  const dotC='#999999';
  const divC='#cccccc';

  function bLine(ctx,x1,y1,x2,y2,alpha){
    if(alpha<=0)return;
    ctx.save();ctx.globalAlpha=alpha*0.85;
    ctx.strokeStyle=`rgba(${BLUE[0]},${BLUE[1]},${BLUE[2]},1)`;
    ctx.lineWidth=LW;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.restore();
  }

  function bDotted(ctx,x1,y1,x2,y2,alpha,growP){
    if(alpha<=0||growP<=0)return;
    const ex=x1+(x2-x1)*growP,ey=y1+(y2-y1)*growP;
    const len=Math.sqrt((ex-x1)**2+(ey-y1)**2);if(len<1)return;
    const dl=3,gl=2,per=dl+gl,dx=(ex-x1)/len,dy=(ey-y1)/len;
    ctx.save();ctx.globalAlpha=alpha*0.85;
    ctx.strokeStyle=`rgba(${BLUE[0]},${BLUE[1]},${BLUE[2]},1)`;
    ctx.lineWidth=LW;ctx.lineCap='round';
    let pos=0;
    while(pos<len){const se=Math.min(pos+dl,len);ctx.beginPath();ctx.moveTo(x1+dx*pos,y1+dy*pos);ctx.lineTo(x1+dx*se,y1+dy*se);ctx.stroke();pos+=per;}
    ctx.restore();
  }

  function bBeamPts(ctx,pts,alpha){
    if(pts.length<2)return;
    for(let i=1;i<pts.length;i++){
      const f=i/pts.length;
      const a=f<0.5?0.6*(f/0.5):0.6+0.4*((f-0.5)/0.5);
      ctx.save();ctx.globalAlpha=alpha*f;
      ctx.strokeStyle=`rgba(${BLUE[0]},${BLUE[1]},${BLUE[2]},${a})`;
      ctx.lineWidth=LW;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[i-1].x,pts[i-1].y);ctx.lineTo(pts[i].x,pts[i].y);
      ctx.stroke();ctx.restore();
    }
  }

  function dotDraw(ctx,x,y,r,color,alpha){
    ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  /* ══ CARD 1 ══ */
  (function(){
    const bc=document.getElementById('c1'),ctx=bc.getContext('2d');
    const card=document.getElementById('card1');
    let hovered=false, animStart=null, raf=null;

    // beam feels physical: fast travel, quick pause, restart
    // total cycle ~2800ms: 0–0.45 beams travel, 0.45–0.52 pause at mid, 0.52–0.78 mid→end, 0.78–0.88 pause, 0.88–1 fade
    const BCYCLE=2800;

    const sourceDots=[{x:28,y:22},{x:22,y:45},{x:32,y:68},{x:20,y:92},{x:30,y:115},{x:24,y:138}];
    const midDot={x:130,y:80}, endDot={x:195,y:80};

    function bezPt(t,x0,y0,cx1,cy1,cx2,cy2,x1,y1){const m=1-t;return{x:m*m*m*x0+3*m*m*t*cx1+3*m*t*t*cx2+t*t*t*x1,y:m*m*m*y0+3*m*m*t*cy1+3*m*t*t*cy2+t*t*t*y1};}
    function getCP(d){return{cx1:d.x+55,cy1:d.y,cx2:midDot.x-30,cy2:midDot.y};}

    function drawBase(){
      ctx.clearRect(0,0,220,160);ctx.fillStyle=BG;ctx.fillRect(0,0,220,160);
      sourceDots.forEach(d=>{
        const cp=getCP(d);ctx.save();ctx.strokeStyle=lineC;ctx.lineWidth=LW;ctx.globalAlpha=1;
        ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.bezierCurveTo(cp.cx1,cp.cy1,cp.cx2,cp.cy2,midDot.x,midDot.y);ctx.stroke();ctx.restore();
      });
      ctx.save();ctx.strokeStyle=lineC;ctx.lineWidth=LW;ctx.globalAlpha=1;
      ctx.beginPath();ctx.moveTo(midDot.x,midDot.y);ctx.lineTo(endDot.x,endDot.y);ctx.stroke();ctx.restore();
      [...sourceDots,midDot,endDot].forEach(d=>dotDraw(ctx,d.x,d.y,2,dotC,1));
    }

    function drawBeams(t){
      const p1e=0.45,p2s=0.52,p3e=0.78,p4s=0.88;
      let ga=1; if(t>p4s)ga=1-easeInOut((t-p4s)/0.12);
      if(t<p2s){
        const h=easeInOut(clamp(t/p1e,0,1));
        sourceDots.forEach(d=>{
          const cp=getCP(d),tail=Math.max(0,h-0.18),steps=40,pts=[];
          for(let i=0;i<=steps;i++){const tt=tail+(h-tail)*(i/steps);pts.push(bezPt(tt,d.x,d.y,cp.cx1,cp.cy1,cp.cx2,cp.cy2,midDot.x,midDot.y));}
          bBeamPts(ctx,pts,ga);
        });
      }
      if(t>=p2s&&t<1){
        const h2=easeInOut(clamp((t-p2s)/(p3e-p2s),0,1));
        const tl=Math.max(0,h2-0.28);
        const lx=midDot.x,ly=midDot.y,ex=endDot.x;
        const hx=lx+(ex-lx)*h2,tx=lx+(ex-lx)*tl,steps=30,pts=[];
        for(let i=0;i<=steps;i++){const f=i/steps;pts.push({x:tx+(hx-tx)*f,y:ly});}
        bBeamPts(ctx,pts,ga);
      }
    }

    function loop(ts){
      if(!hovered){drawBase();raf=null;return;}
      if(!animStart)animStart=ts;
      const t=((ts-animStart)%BCYCLE)/BCYCLE;
      drawBase();drawBeams(t);
      raf=requestAnimationFrame(loop);
    }

    card.addEventListener('mouseenter',()=>{hovered=true;animStart=null;if(!raf)raf=requestAnimationFrame(loop);});
    card.addEventListener('mouseleave',()=>{hovered=false;animStart=null;drawBase();});

    drawBase();
  })();

  /* ══ CARD 2 ══ */
  (function(){
    const ic=document.getElementById('c2'),ctx=ic.getContext('2d');
    const card=document.getElementById('card2');
    let hovered=false, animStart=null, raf=null;
    const ISO_CYCLE=6000;
    const pW=50,pH=13,cxI=110;

    const layers=[
      {label:'Infrastructure',topY:116,fill:'#ebebeb',tc:'#666'},
      {label:'Product',       topY:90, fill:'#ebebeb',tc:'#555'},
      {label:'Business',      topY:64, fill:'#ebebeb',tc:'#444'},
    ];

    function iso(topY,u,v){return{x:cxI+u*pW-v*pW,y:topY+u*pH+v*pH};}
    function getC(topY){const tl=iso(topY,-1,-1),tr=iso(topY,1,-1),br=iso(topY,1,1),bl=iso(topY,-1,1);return{tl,tr,br,bl};}

    function drawLayerFlat(layer){
      const c=getC(layer.topY);
      ctx.save();ctx.globalAlpha=1;
      ctx.beginPath();ctx.moveTo(c.tl.x,c.tl.y);ctx.lineTo(c.tr.x,c.tr.y);ctx.lineTo(c.br.x,c.br.y);ctx.lineTo(c.bl.x,c.bl.y);ctx.closePath();
      ctx.fillStyle=layer.fill;ctx.fill();
      // subtle grey stroke only — no blue
      ctx.strokeStyle='#d8d8d8';ctx.lineWidth=LW;ctx.stroke();
      const edgeDx=c.br.x-c.bl.x,edgeDy=c.br.y-c.bl.y,angle=Math.atan2(edgeDy,edgeDx);
      const sx=c.bl.x+(c.br.x-c.bl.x)*0.02+(c.tl.x-c.bl.x)*0.18;
      const sy=c.bl.y+(c.br.y-c.bl.y)*0.02+(c.tl.y-c.bl.y)*0.18;
      ctx.save();ctx.translate(sx,sy);ctx.rotate(angle);
      ctx.font='9px monospace';ctx.fillStyle=layer.tc;ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(layer.label,0,0);ctx.restore();
      ctx.restore();
    }

    function drawLayerAnimated(layer,alpha,slideY){
      if(alpha<=0)return;
      const c=getC(layer.topY+slideY);
      ctx.save();ctx.globalAlpha=alpha;
      ctx.beginPath();ctx.moveTo(c.tl.x,c.tl.y);ctx.lineTo(c.tr.x,c.tr.y);ctx.lineTo(c.br.x,c.br.y);ctx.lineTo(c.bl.x,c.bl.y);ctx.closePath();
      ctx.fillStyle=layer.fill;ctx.fill();
      const edgeDx=c.br.x-c.bl.x,edgeDy=c.br.y-c.bl.y,angle=Math.atan2(edgeDy,edgeDx);
      const sx=c.bl.x+(c.br.x-c.bl.x)*0.02+(c.tl.x-c.bl.x)*0.18;
      const sy=c.bl.y+(c.br.y-c.bl.y)*0.02+(c.tl.y-c.bl.y)*0.18;
      ctx.save();ctx.translate(sx,sy);ctx.rotate(angle);
      ctx.font='9px monospace';ctx.fillStyle=layer.tc;ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(layer.label,0,0);ctx.restore();
      ctx.restore();
      bLine(ctx,c.tl.x,c.tl.y,c.tr.x,c.tr.y,alpha);
      bLine(ctx,c.tr.x,c.tr.y,c.br.x,c.br.y,alpha);
      bLine(ctx,c.br.x,c.br.y,c.bl.x,c.bl.y,alpha);
      bLine(ctx,c.bl.x,c.bl.y,c.tl.x,c.tl.y,alpha);
    }

    const starts=[0.00,0.29,0.55],ends=[0.28,0.54,0.78],holdEnd=0.88,fadeDur=0.12;
    function lA(i,t){const s=starts[i],e=ends[i];if(t<s)return 0;if(t<e)return easeInOut((t-s)/(e-s));if(t<holdEnd)return 1;return 1-easeInOut((t-holdEnd)/fadeDur);}
    function lS(i,t){const s=starts[i],e=ends[i];if(t<s)return 22;if(t<e)return 22*(1-easeInOut((t-s)/(e-s)));return 0;}

    function drawBase(){
      ctx.clearRect(0,0,220,160);ctx.fillStyle=BG;ctx.fillRect(0,0,220,160);
      layers.forEach(l=>drawLayerFlat(l));
    }

    function loop(ts){
      if(!hovered){drawBase();raf=null;return;}
      if(!animStart)animStart=ts;
      const t=((ts-animStart)%ISO_CYCLE)/ISO_CYCLE;
      ctx.clearRect(0,0,220,160);ctx.fillStyle=BG;ctx.fillRect(0,0,220,160);
      const c0=getC(layers[0].topY),c1=getC(layers[1].topY),c2=getC(layers[2].topY);
      for(let i=0;i<layers.length;i++) drawLayerAnimated(layers[i],lA(i,t),lS(i,t));
      const a1=lA(1,t);
      if(a1>0){bDotted(ctx,c1.bl.x,c1.bl.y,c0.bl.x,c0.bl.y,a1,a1);bDotted(ctx,c1.br.x,c1.br.y,c0.br.x,c0.br.y,a1,a1);bDotted(ctx,c1.tr.x,c1.tr.y,c0.tr.x,c0.tr.y,a1,a1);}
      const a2=lA(2,t);
      if(a2>0){bDotted(ctx,c2.bl.x,c2.bl.y,c1.bl.x,c1.bl.y,a2,a2);bDotted(ctx,c2.br.x,c2.br.y,c1.br.x,c1.br.y,a2,a2);bDotted(ctx,c2.tr.x,c2.tr.y,c1.tr.x,c1.tr.y,a2,a2);}
      raf=requestAnimationFrame(loop);
    }

    card.addEventListener('mouseenter',()=>{hovered=true;animStart=null;if(!raf)raf=requestAnimationFrame(loop);});
    card.addEventListener('mouseleave',()=>{hovered=false;animStart=null;drawBase();});

    drawBase();
  })();

  /* ══ CARD 3 ══ */
  (function(){
    const bc=document.getElementById('c3'),ctx=bc.getContext('2d');
    const card=document.getElementById('card3');
    let hovered=false, animStart=null, raf=null;
    const SCYCLE=3200;
    const W=220,H=160,mid=W/2;

    const fillL='#e8e8e8', fillR=BG;
    const btnStroke='#bbb', textC='#888888';

    function drawScene(beamX){
      ctx.clearRect(0,0,W,H);ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

      // divider — 0.5px
      const dg=ctx.createLinearGradient(0,0,0,H);
      dg.addColorStop(0,'transparent');dg.addColorStop(0.2,divC);dg.addColorStop(0.8,divC);dg.addColorStop(1,'transparent');
      ctx.save();ctx.strokeStyle=dg;ctx.lineWidth=0.5;ctx.globalAlpha=1;
      ctx.beginPath();ctx.moveTo(mid,0);ctx.lineTo(mid,H);ctx.stroke();ctx.restore();

      const lw=LW;
      function wRect(x,y,w,h,rx){
        ctx.save();ctx.globalAlpha=1;ctx.beginPath();
        if(rx){ctx.moveTo(x+rx,y);ctx.lineTo(x+w-rx,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rx);ctx.lineTo(x+w,y+h-rx);ctx.quadraticCurveTo(x+w,y+h,x+w-rx,y+h);ctx.lineTo(x+rx,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-rx);ctx.lineTo(x,y+rx);ctx.quadraticCurveTo(x,y,x+rx,y);ctx.closePath();}
        else{ctx.rect(x,y,w,h);}
        ctx.strokeStyle=lineC;ctx.lineWidth=lw;ctx.stroke();ctx.restore();
      }
      // left wireframe
      wRect(6,14,98,11,2);
      wRect(6,30,98,44,2);
      ctx.save();ctx.strokeStyle=lineC;ctx.lineWidth=lw;ctx.globalAlpha=1;
      ctx.beginPath();ctx.moveTo(6,30);ctx.lineTo(104,74);ctx.stroke();
      ctx.beginPath();ctx.moveTo(104,30);ctx.lineTo(6,74);ctx.stroke();ctx.restore();
      wRect(6,80,44,7,2);
      wRect(6,92,98,5,1);
      wRect(6,101,70,5,1);
      wRect(22,112,60,13,3);
      [[6,14],[104,14],[6,74],[104,74]].forEach(([x,y])=>dotDraw(ctx,x,y,1.5,dotC,1));

      // right rendered
      const ox=110;
      function rRect(x,y,w,h,rx,fill,stroke){
        ctx.save();ctx.globalAlpha=1;ctx.beginPath();
        if(rx){ctx.moveTo(x+rx,y);ctx.lineTo(x+w-rx,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rx);ctx.lineTo(x+w,y+h-rx);ctx.quadraticCurveTo(x+w,y+h,x+w-rx,y+h);ctx.lineTo(x+rx,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-rx);ctx.lineTo(x,y+rx);ctx.quadraticCurveTo(x,y,x+rx,y);ctx.closePath();}
        else{ctx.rect(x,y,w,h);}
        if(fill){ctx.fillStyle=fill;ctx.fill();}
        if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
        ctx.restore();
      }
      rRect(ox+6,14,98,11,2,fillL,'#ccc');
      ctx.save();ctx.globalAlpha=1;ctx.fillStyle='#d8d8d8';ctx.fillRect(ox+10,17,28,5);ctx.restore();
      ctx.save();ctx.globalAlpha=1;ctx.fillStyle='#ddd';ctx.fillRect(ox+78,17,16,5);ctx.restore();
      rRect(ox+6,30,98,44,2,fillL,'#ccc');
      rRect(ox+12,34,86,36,1,fillR,null);
      rRect(ox+6,80,44,7,2,'#d8d8d8',null);
      rRect(ox+6,92,98,4,1,'#e0e0e0',null);
      rRect(ox+6,101,70,4,1,'#e4e4e4',null);
      rRect(ox+22,112,60,13,3,fillL,btnStroke);
      ctx.save();ctx.globalAlpha=1;ctx.fillStyle=textC;ctx.font='7px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('Launch',ox+52,118.5);ctx.restore();

      // scan beam
      if(beamX!==null){
        const sg=ctx.createLinearGradient(0,0,0,H);
        sg.addColorStop(0,'transparent');
        sg.addColorStop(0.2,`rgba(${BLUE[0]},${BLUE[1]},${BLUE[2]},0.6)`);
        sg.addColorStop(0.5,`rgba(${BLUE[0]},${BLUE[1]},${BLUE[2]},1)`);
        sg.addColorStop(0.8,`rgba(${BLUE[0]},${BLUE[1]},${BLUE[2]},0.6)`);
        sg.addColorStop(1,'transparent');
        ctx.save();ctx.strokeStyle=sg;ctx.lineWidth=LW;ctx.globalAlpha=1;
        ctx.beginPath();ctx.moveTo(beamX,0);ctx.lineTo(beamX,H);ctx.stroke();ctx.restore();
      }
    }

    function loop(ts){
      if(!hovered){drawScene(null);raf=null;return;}
      if(!animStart)animStart=ts;
      const t=((ts-animStart)%SCYCLE)/SCYCLE;
      const beamX=easeInOut(t)*W;
      drawScene(beamX);
      raf=requestAnimationFrame(loop);
    }

    card.addEventListener('mouseenter',()=>{hovered=true;animStart=null;if(!raf)raf=requestAnimationFrame(loop);});
    card.addEventListener('mouseleave',()=>{hovered=false;animStart=null;drawScene(null);});

    drawScene(null);
  })();

})();
</script>
